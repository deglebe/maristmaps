listen_addresses: '0.0.0.0:3000'
keep_alive: 75
worker_processes: 8

cache:
  size_mb: 512

preferred_encoding: gzip

cors:
  origin:
    - '*'
  max_age: 3600

postgres:
  connection_string: ${DATABASE_URL:-postgres://maristmaps:maristmaps@db:5432/maristmaps}
  pool_size: 20
  default_srid: 3857
  auto_bounds: quick
  on_invalid: warn

  # Publish every table in `public` that has a geometry column, with ALL its
  # columns exposed as MVT feature properties. This is what lets the MapLibre
  # style filter on tags like `highway`, `building`, `amenity`, etc. If we
  # instead list tables explicitly with `properties: {}`, Martin emits
  # property-less features and every filter returns false (blank map).
  #
  # NOTE: Martin only scans the schema at startup, so any time new tables
  # appear (e.g. after `scripts/load-osm.sh`) run `docker compose restart
  # martin` to refresh the catalog.
  auto_publish: true
