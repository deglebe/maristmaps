{% extends "base.html" %}
{% block title %}Marist Maps{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
{% endblock %}
{% block header %}
<a href="{{ url_for('main.index') }}" class="brand">marist maps</a>
{% endblock %}
{% block body_attrs %}class="app-shell"{% endblock %}
{% block content %}
<div class="app-layout">
  <aside class="search-panel" aria-label="Search">
    <form class="search-form" role="search" onsubmit="return false;">
      <input
        class="search-input"
        id="search-q"
        name="q"
        type="search"
        placeholder="Search places…"
        autocomplete="off"
        aria-label="Search"
      >
    </form>
  </aside>
  <section class="map-stage" aria-label="Map">
    <div id="map" role="application" aria-label="Interactive map"></div>
  </section>
</div>
<script type="application/json" id="map-page-config">{{ map_config | tojson }}</script>
<script>
  const cfg = JSON.parse(document.getElementById("map-page-config").textContent);
  const map = new maplibregl.Map({
    container: 'map',
    attributionControl: true,
    style: {
      version: 8,
      sources: {
        osm: {
          type: 'vector',
          tiles: [cfg.tileUrl],
          minzoom: 0,
          maxzoom: 22
        }
      },
      layers: [
        {
          id: 'background',
          type: 'background',
          paint: { 'background-color': '#e8e4df' }
        },
        {
          id: 'roads',
          type: 'line',
          source: 'osm',
          'source-layer': cfg.vectorLayer,
          paint: {
            'line-color': '#5c5c5c',
            'line-width': ['interpolate', ['linear'], ['zoom'], 10, 0.4, 16, 2.5]
          }
        }
      ]
    },
    center: cfg.center,
    zoom: cfg.zoom
  });
  map.addControl(new maplibregl.NavigationControl(), 'top-right');
  map.once('load', () => {
    map.resize();
  });
</script>
{% endblock %}
