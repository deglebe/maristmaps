{% extends "base.html" %}
{% block title %}Map{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
{% endblock %}
{% block header %}{% endblock %}
{% block body_attrs %}class="app-shell app-shell--map"{% endblock %}
{% block content %}
<div class="map-viewport">
  <div id="map" role="application" aria-label="Interactive map"></div>
  <div class="search-overlay">
    <div class="search-card" id="search-card">
      <form class="search-form" role="search" onsubmit="return false;">
        <div class="search-bar-row">
          <div class="search-input-wrap search-input-wrap--faux-empty" id="search-input-wrap">
            <input
              class="search-input"
              id="search-q"
              type="text"
              inputmode="search"
              enterkeyhint="search"
              autocomplete="off"
              aria-label="Search campus map"
              aria-controls="search-results"
              aria-expanded="false"
            >
            <span class="search-placeholder-cycle" id="search-placeholder-cycle" aria-hidden="true"></span>
          </div>
          <button type="button" class="search-icon-btn" id="search-icon-btn" aria-label="Search" tabindex="-1">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="7"/>
              <path d="M20 20l-3.5-3.5"/>
            </svg>
          </button>
        </div>
      </form>
      <ul class="search-results" id="search-results" role="listbox" hidden></ul>
    </div>
  </div>
</div>
<script type="application/json" id="map-page-config">{{ map_config | tojson }}</script>
<script src="{{ url_for('static', filename='map.js') }}" defer></script>
<script src="{{ url_for('static', filename='search.js') }}" defer></script>
{% endblock %}
