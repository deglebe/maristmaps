{% extends "base.html" %}
{% block title %}map{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  .maplibregl-popup-content {
    font: 13px/1.35 system-ui, sans-serif;
    padding: 0.5rem 0.7rem;
    max-width: 22rem;
  }
  .maplibregl-popup-content strong {
    display: block;
    margin-bottom: 0.35rem;
    font-size: 14px;
  }
  .maplibregl-popup-content .tag { color: #666; font-size: 11px; }
  .maplibregl-popup-content table.attrs {
    border-collapse: collapse;
    width: 100%;
    font-size: 12px;
  }
  .maplibregl-popup-content table.attrs th,
  .maplibregl-popup-content table.attrs td {
    text-align: left;
    vertical-align: top;
    padding: 2px 6px 2px 0;
    border-bottom: 1px solid #eee;
  }
  .maplibregl-popup-content table.attrs th {
    font-weight: 500;
    color: #555;
    white-space: nowrap;
  }
  .maplibregl-popup-content table.attrs td {
    color: #222;
    word-break: break-word;
  }
  .pitch-toggle button {
    width: 29px;
    height: 29px;
    font: 600 11px/1 system-ui, sans-serif;
    letter-spacing: 0.5px;
    background: #fff;
    color: #333;
    border: 0;
    cursor: pointer;
  }
  .pitch-toggle button:hover { background: #f0f0f0; }
  .pitch-toggle.active button,
  .pitch-toggle button.active { background: #3f75c4; color: #fff; }
</style>
{% endblock %}
{% block body_attrs %}class="map-view"{% endblock %}
{% block content %}
<div id="map" role="application" aria-label="Campus map"></div>
<script type="application/json" id="map-page-config">{{ map_config | tojson }}</script>
<script>
  const cfg = JSON.parse(document.getElementById('map-page-config').textContent);
  const tiles = (table) => `${cfg.martinBase}/${table}/{z}/{x}/{y}`;

  /* map focused on footpaths */
  const GREEN_LANDUSE = ['grass', 'park', 'recreation_ground', 'meadow', 'forest', 'cemetery', 'village_green'];
  const GREEN_LEISURE = ['park', 'garden', 'pitch', 'playground', 'nature_reserve', 'golf_course'];
  const MAJOR_ROADS  = ['motorway', 'trunk', 'primary', 'secondary', 'tertiary',
                        'motorway_link', 'trunk_link', 'primary_link', 'secondary_link', 'tertiary_link'];
  const MINOR_ROADS  = ['residential', 'service', 'unclassified', 'living_street', 'road'];
  const PATH_KINDS   = ['footway', 'path', 'pedestrian', 'cycleway', 'track', 'bridleway', 'corridor'];
  const STAIR_KINDS  = ['steps'];

  /* palette generated by claude to roughly match google maps ish */
  const C = {
    bg:          '#f2efe6',
    green:       '#c4dfa2',
    campus:      '#ebe5d3',
    paved:       '#e4dfd2',
    building:    '#d9cfbe',
    buildOutline:'#8a7559',
    water:       '#aad3df',
    majorFill:   '#fce5a7',
    majorCase:   '#d59952',
    minorFill:   '#ffffff',
    minorCase:   '#b6ad99',
    pathFill:    '#b96e30',
    pathCasing:  '#ffffff',
    pathStairs:  '#8c4a1a'
  };
  const PATH_COLOR  = C.pathFill;
  const PATH_STAIRS = C.pathStairs;

  const style = {
    version: 8,
    sources: {
      osm_polygon: { type: 'vector', tiles: [tiles('planet_osm_polygon')], minzoom: 0, maxzoom: 16 },
      osm_line:    { type: 'vector', tiles: [tiles('planet_osm_line')],    minzoom: 0, maxzoom: 16 },
      osm_roads:   { type: 'vector', tiles: [tiles('planet_osm_roads')],   minzoom: 0, maxzoom: 16 },
      osm_point:   { type: 'vector', tiles: [tiles('planet_osm_point')],   minzoom: 0, maxzoom: 16 }
    },
    layers: [
      { id: 'bg', type: 'background', paint: { 'background-color': C.bg } },

      {
        id: 'landuse-green',
        type: 'fill',
        source: 'osm_polygon', 'source-layer': 'planet_osm_polygon',
        filter: ['any',
          ['in', ['get', 'landuse'], ['literal', GREEN_LANDUSE]],
          ['in', ['get', 'leisure'], ['literal', GREEN_LEISURE]],
          ['in', ['get', 'natural'], ['literal', ['wood', 'scrub', 'grassland']]]
        ],
        paint: { 'fill-color': C.green, 'fill-opacity': 0.9 }
      },
      {
        id: 'landuse-campus',
        type: 'fill',
        source: 'osm_polygon', 'source-layer': 'planet_osm_polygon',
        filter: ['in', ['get', 'amenity'], ['literal', ['school', 'university', 'college']]],
        paint: { 'fill-color': C.campus }
      },
      {
        id: 'landuse-paved',
        type: 'fill',
        source: 'osm_polygon', 'source-layer': 'planet_osm_polygon',
        filter: ['any',
          ['==', ['get', 'amenity'], 'parking'],
          ['==', ['get', 'landuse'], 'residential'],
          ['==', ['get', 'landuse'], 'commercial']
        ],
        paint: { 'fill-color': C.paved }
      },
      {
        id: 'water-fill',
        type: 'fill',
        source: 'osm_polygon', 'source-layer': 'planet_osm_polygon',
        filter: ['any',
          ['==', ['get', 'natural'], 'water'],
          ['==', ['get', 'waterway'], 'riverbank'],
          ['==', ['get', 'landuse'], 'reservoir']
        ],
        paint: { 'fill-color': C.water }
      },
      {
        id: 'waterway',
        type: 'line',
        source: 'osm_line', 'source-layer': 'planet_osm_line',
        filter: ['in', ['get', 'waterway'], ['literal', ['river', 'stream', 'canal', 'drain', 'ditch']]],
        paint: {
          'line-color': C.water,
          'line-width': ['interpolate', ['linear'], ['zoom'], 10, 0.5, 18, 3]
        }
      },

      // --- Vehicle roads: OSM-style casing/fill hierarchy ---
      {
        id: 'roads-minor-casing',
        type: 'line',
        source: 'osm_line', 'source-layer': 'planet_osm_line',
        filter: ['in', ['get', 'highway'], ['literal', MINOR_ROADS]],
        minzoom: 12,
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': C.minorCase,
          'line-width': ['interpolate', ['linear'], ['zoom'], 12, 1.2, 18, 9]
        }
      },
      {
        id: 'roads-minor',
        type: 'line',
        source: 'osm_line', 'source-layer': 'planet_osm_line',
        filter: ['in', ['get', 'highway'], ['literal', MINOR_ROADS]],
        minzoom: 12,
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': C.minorFill,
          'line-width': ['interpolate', ['linear'], ['zoom'], 12, 0.5, 18, 7]
        }
      },
      {
        id: 'roads-major-casing',
        type: 'line',
        source: 'osm_line', 'source-layer': 'planet_osm_line',
        filter: ['in', ['get', 'highway'], ['literal', MAJOR_ROADS]],
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': C.majorCase,
          'line-width': ['interpolate', ['linear'], ['zoom'], 10, 1.2, 18, 15]
        }
      },
      {
        id: 'roads-major',
        type: 'line',
        source: 'osm_line', 'source-layer': 'planet_osm_line',
        filter: ['in', ['get', 'highway'], ['literal', MAJOR_ROADS]],
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': C.majorFill,
          'line-width': ['interpolate', ['linear'], ['zoom'], 10, 0.6, 18, 11]
        }
      },

      // --- Buildings (2D) ---
      // Visible whenever the map is not tilted; the `pitchend` handler below
      // swaps these out for the 3D extrusion layer when you tilt the camera.
      {
        id: 'buildings',
        type: 'fill',
        source: 'osm_polygon', 'source-layer': 'planet_osm_polygon',
        filter: ['has', 'building'],
        paint: { 'fill-color': C.building, 'fill-opacity': 1.0 }
      },
      {
        id: 'buildings-outline',
        type: 'line',
        source: 'osm_polygon', 'source-layer': 'planet_osm_polygon',
        filter: ['has', 'building'],
        paint: {
          'line-color': C.buildOutline,
          'line-width': ['interpolate', ['linear'], ['zoom'], 14, 0.6, 20, 1.8]
        }
      },
      // Hover highlight for buildings. Initial filter matches nothing; the
      // `mousemove`/`mouseleave` handlers below call setFilter to point it at
      // the currently-hovered osm_id.
      {
        id: 'buildings-hover',
        type: 'fill',
        source: 'osm_polygon', 'source-layer': 'planet_osm_polygon',
        filter: ['==', ['get', 'osm_id'], -1],
        paint: { 'fill-color': '#f6c470', 'fill-opacity': 0.55 }
      },

      // --- Buildings (3D extrusion, shown only when the camera is tilted) ---
      // Height comes from OSM `height` (meters) when present, else from
      // `building:levels * 3.5`, else a 10 m fallback so every building has
      // some mass. The extrusion layer is hidden at pitch=0 so zoomed-out,
      // straight-down views stay crisp and legible.
      {
        id: 'buildings-3d',
        type: 'fill-extrusion',
        source: 'osm_polygon', 'source-layer': 'planet_osm_polygon',
        filter: ['has', 'building'],
        layout: { visibility: 'none' },
        paint: {
          'fill-extrusion-color': C.building,
          'fill-extrusion-height': [
            'case',
            ['has', 'height'],
              ['to-number', ['get', 'height'], 10],
            ['has', 'building:levels'],
              ['*', ['to-number', ['get', 'building:levels'], 3], 3.5],
            10
          ],
          'fill-extrusion-base': 0,
          'fill-extrusion-opacity': 0.92,
          'fill-extrusion-vertical-gradient': true
        }
      },

      // --- Paths: campus headline, but calmer than before ---
      {
        id: 'paths-casing',
        type: 'line',
        source: 'osm_line', 'source-layer': 'planet_osm_line',
        filter: ['in', ['get', 'highway'], ['literal', PATH_KINDS.concat(STAIR_KINDS)]],
        minzoom: 12,
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': C.pathCasing,
          'line-width': ['interpolate', ['linear'], ['zoom'], 12, 1.5, 15, 4, 19, 9],
          'line-opacity': 0.95
        }
      },
      {
        id: 'paths',
        type: 'line',
        source: 'osm_line', 'source-layer': 'planet_osm_line',
        filter: ['in', ['get', 'highway'], ['literal', PATH_KINDS]],
        minzoom: 12,
        layout: { 'line-cap': 'butt', 'line-join': 'round' },
        paint: {
          'line-color': PATH_COLOR,
          'line-width': ['interpolate', ['linear'], ['zoom'], 12, 0.8, 15, 1.8, 19, 4],
          'line-dasharray': [2, 1.25]
        }
      },
      {
        id: 'paths-stairs',
        type: 'line',
        source: 'osm_line', 'source-layer': 'planet_osm_line',
        filter: ['in', ['get', 'highway'], ['literal', STAIR_KINDS]],
        minzoom: 14,
        layout: { 'line-cap': 'butt', 'line-join': 'round' },
        paint: {
          'line-color': PATH_STAIRS,
          'line-width': ['interpolate', ['linear'], ['zoom'], 14, 2, 19, 6],
          'line-dasharray': [0.6, 0.5]
        }
      },

      // --- POIs ---
      // POI circles are temporarily hidden via `layout.visibility` — the
      // underlying source/filter is kept so turning them back on is a
      // one-line change.
      {
        id: 'poi-circles',
        type: 'circle',
        source: 'osm_point', 'source-layer': 'planet_osm_point',
        layout: { visibility: 'none' },
        minzoom: 14,
        filter: ['any',
          ['has', 'amenity'], ['has', 'shop'], ['has', 'tourism'],
          ['has', 'leisure'], ['has', 'office'], ['has', 'healthcare']
        ],
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 14, 2.5, 18, 5],
          'circle-color': '#2a5d9f',
          'circle-stroke-color': '#ffffff',
          'circle-stroke-width': 1.2
        }
      },

      // --- Labels ---
      // Text / symbol layers are intentionally omitted until we self-host a
      // glyph set; see the `glyphs:` comment above. Popups on click still
      // surface every tagged attribute, so we don't lose discoverability.
    ]
  };

  // Campus is only ~1 km across, so clamp both the zoom range and the
  // pannable area. Without this you can zoom out until the data is a dot or
  // pan across the Hudson into blank territory the PBF doesn't cover.
  const CAMPUS_BOUNDS = [
    [cfg.center[0] - 0.014, cfg.center[1] - 0.010], // SW  (~1.15 km W, ~1.10 km S)
    [cfg.center[0] + 0.014, cfg.center[1] + 0.010]  // NE
  ];

  const map = new maplibregl.Map({
    container: 'map',
    attributionControl: true,
    antialias: true,          // smoother edges on extruded building walls
    style,
    center: cfg.center,
    zoom: cfg.zoom,
    minZoom: 14,
    maxZoom: 20,
    maxPitch: 75,
    maxBounds: CAMPUS_BOUNDS
  });
  map.addControl(
    new maplibregl.NavigationControl({ visualizePitch: true, showCompass: true }),
    'top-right'
  );
  map.addControl(new maplibregl.ScaleControl({ unit: 'imperial' }), 'bottom-left');

  // Tilt affordance: right-click + drag (or ctrl-drag) rotates/pitches the
  // camera, same as Google Maps. Double-click the compass to reset north/up.
  // Once pitch > PITCH_3D_THRESHOLD the 2D building fill/outline swap out for
  // the extruded variant; below that threshold we go back to the flat view
  // because top-down 3D boxes just look like chunky outlines.
  const PITCH_3D_THRESHOLD = 15;
  let in3d = false;
  const update3dLayers = () => {
    const shouldBe3d = map.getPitch() > PITCH_3D_THRESHOLD;
    if (shouldBe3d === in3d) return;
    in3d = shouldBe3d;
    const set = (id, visible) =>
      map.setLayoutProperty(id, 'visibility', visible ? 'visible' : 'none');
    set('buildings',         !in3d);
    set('buildings-outline', !in3d);
    set('buildings-3d',       in3d);
    if (toggleBtn) toggleBtn.classList.toggle('active', in3d);
  };
  map.on('pitch', update3dLayers);
  map.on('load', update3dLayers);

  // A simple custom control that flips between flat and tilted views. Drops
  // in next to the navigation control so it reads as part of the toolset.
  class PitchToggle {
    onAdd(m) {
      this._map = m;
      this._container = document.createElement('div');
      this._container.className = 'maplibregl-ctrl maplibregl-ctrl-group pitch-toggle';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.title = 'Toggle 3D view';
      btn.setAttribute('aria-label', 'Toggle 3D view');
      btn.textContent = '3D';
      btn.addEventListener('click', () => {
        const currentPitch = m.getPitch();
        m.easeTo({
          pitch: currentPitch > PITCH_3D_THRESHOLD ? 0 : 55,
          bearing: currentPitch > PITCH_3D_THRESHOLD ? 0 : m.getBearing(),
          duration: 500
        });
      });
      this._container.appendChild(btn);
      this._btn = btn;
      return this._container;
    }
    onRemove() { this._container.remove(); this._map = undefined; }
  }
  const pitchToggle = new PitchToggle();
  map.addControl(pitchToggle, 'top-right');
  const toggleBtn = pitchToggle._btn;

  const CLICKABLE_LAYERS = ['buildings', 'paths', 'paths-stairs'];
  const escapeHtml = (s) => String(s).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);

  // Columns osm2pgsql's default style writes as real columns (as opposed to
  // the hstore `tags` bucket). We render them in a fixed-ish order so the
  // most useful attributes are at the top of the popup.
  const BUILDING_TAG_ORDER = [
    'building', 'name', 'addr:housename', 'addr:housenumber', 'addr:street',
    'amenity', 'operator', 'ref', 'building:levels', 'height', 'access',
    'wheelchair', 'opening_hours', 'phone', 'website'
  ];
  const GENERIC_TAG_ORDER = [
    'name', 'amenity', 'shop', 'tourism', 'leisure', 'office', 'healthcare',
    'highway', 'surface', 'bicycle', 'foot', 'wheelchair', 'oneway', 'access',
    'landuse', 'natural', 'waterway', 'man_made', 'barrier', 'ref'
  ];
  // Ignore noise from osm2pgsql / postgis that isn't useful in a popup.
  const HIDDEN_KEYS = new Set(['osm_id', 'way_area', 'z_order']);

  const attributeRows = (props, preferredOrder) => {
    const seen = new Set();
    const rows = [];
    const push = (k) => {
      if (seen.has(k) || HIDDEN_KEYS.has(k)) return;
      const v = props[k];
      if (v === undefined || v === null || v === '') return;
      seen.add(k);
      rows.push(
        `<tr><th>${escapeHtml(k)}</th><td>${escapeHtml(v)}</td></tr>`
      );
    };
    preferredOrder.forEach(push);
    // Then spill everything else we haven't shown yet.
    Object.keys(props).sort().forEach(push);
    return rows.join('');
  };

  const popupHtml = (feature) => {
    const p = feature.properties || {};
    const isBuilding = feature.layer && feature.layer.id === 'buildings';
    const preferred = isBuilding ? BUILDING_TAG_ORDER : GENERIC_TAG_ORDER;
    const title = p.name || p['addr:housename'] || p['addr:housenumber'] ||
                  p.building || p.amenity || p.shop || p.highway || 'Feature';
    const rows = attributeRows(p, preferred);
    const body = rows
      ? `<table class="attrs">${rows}</table>`
      : '<div class="tag">no tagged attributes</div>';
    return `<strong>${escapeHtml(title)}</strong>${body}`;
  };

  map.on('click', (e) => {
    const features = map.queryRenderedFeatures(e.point, { layers: CLICKABLE_LAYERS });
    if (!features.length) return;
    new maplibregl.Popup({ closeButton: true, closeOnClick: true, maxWidth: '22rem' })
      .setLngLat(e.lngLat)
      .setHTML(popupHtml(features[0]))
      .addTo(map);
  });

  CLICKABLE_LAYERS.forEach((id) => {
    map.on('mouseenter', id, () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', id, () => { map.getCanvas().style.cursor = ''; });
  });

  // Drive the building-highlight layer by rewriting its filter on mousemove.
  const NO_MATCH_FILTER = ['==', ['get', 'osm_id'], -1];
  let hoveredOsmId = null;
  map.on('mousemove', 'buildings', (e) => {
    if (!e.features.length) return;
    const id = e.features[0].properties && e.features[0].properties.osm_id;
    if (id === hoveredOsmId) return;
    hoveredOsmId = id;
    if (id !== undefined && id !== null) {
      map.setFilter('buildings-hover', ['==', ['get', 'osm_id'], id]);
    }
  });
  map.on('mouseleave', 'buildings', () => {
    hoveredOsmId = null;
    map.setFilter('buildings-hover', NO_MATCH_FILTER);
  });

  map.on('error', (e) => {
    if (e && e.error) console.warn('[map]', e.error.message || e.error, e.source || '');
  });

  // One-shot diagnostic: after the first render, report how many building
  // features MapLibre actually has in view. If this is 0 after you land on
  // campus, the problem is upstream (martin returned empty tiles or the
  // polygon source isn't in its catalog) rather than a style issue.
  map.once('idle', () => {
    const n = map.queryRenderedFeatures({ layers: ['buildings'] }).length;
    console.log(`[map] buildings in viewport after first render: ${n}`);
    if (n === 0) {
      console.warn('[map] no building features. Check `curl -s ' +
                   cfg.martinBase + '/catalog` and make sure planet_osm_polygon ' +
                   'is listed; then `docker compose restart martin` if not.');
    }
  });
</script>
{% endblock %}
